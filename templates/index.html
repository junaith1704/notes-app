<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }

        .note {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
        }

        a {
            color: red;
            margin-left: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h2>Notes App</h2>

<form action="/add" method="POST">
    <input type="text" name="note" placeholder="Enter note">
    <button type="submit">Add</button>
</form>

{% for note in notes %}
    <div class="note">
        {{ note['note'] }}
        <a href="/delete/{{ note['_id'] }}">Delete</a>
    </div>
{% endfor %}

</body>
</html>
